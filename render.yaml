services:
  # NestJS Backend
  - type: web
    name: velxo-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start:migrate
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_PASSWORD
        value: Fadekemi123@
      - key: PAYMENT_IO_API_URL
        value: https://api.paymento.io/v1
      - key: PAYMENT_IO_IPN_URL
        value: https://velxo.onrender.com/api/v1/payments/webhook/paymentio
      - key: PAYMENT_IO_API_KEY
        sync: false
      - key: PAYMENT_IO_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://market.velxo.shop
      - key: CORS_ORIGIN
        value: https://velxo.shop,https://market.velxo.shop
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

  # Next.js Landing (velxo.shop)
  - type: web
    name: velxo-landing
    env: docker
    plan: free
    rootDir: landing
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://velxo.onrender.com/api/v1

  # Next.js Frontend (market.velxo.shop)
  - type: web
    name: velxo-frontend
    env: docker
    plan: free
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://velxo.onrender.com/api/v1
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
