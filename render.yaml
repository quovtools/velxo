services:
  # NestJS Backend
  - type: web
    name: velxo-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:migrate
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
       - key: CORS_ORIGIN
         value: https://velxo.shop,https://market.velxo.shop

  # Next.js Landing (velxo.shop)
  - type: web
    name: velxo-landing
    env: docker
    plan: free
    rootDir: landing
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://velxo.onrender.com/api/v1

  # Next.js Frontend (market.velxo.shop)
  - type: web
    name: velxo-frontend
    env: docker
    plan: free
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://velxo.onrender.com/api/v1
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
