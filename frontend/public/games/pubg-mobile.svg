<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#1C2B1E"/>
  <defs>
    <linearGradient id="pubg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A3D1C"/>
      <stop offset="100%" stop-color="#0F1A0A"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#pubg-bg)"/>
  <!-- Helmet top -->
  <ellipse cx="32" cy="22" rx="14" ry="10" fill="#D4AF37"/>
  <!-- Helmet brim -->
  <rect x="15" y="28" width="34" height="5" rx="2" fill="#B8922A"/>
  <!-- Visor -->
  <rect x="21" y="24" width="22" height="8" rx="2" fill="#1a1a1a"/>
  <rect x="23" y="25" width="18" height="5" rx="1" fill="#2a3a5c" opacity="0.8"/>
  <!-- Chin strap -->
  <rect x="21" y="32" width="4" height="6" rx="1" fill="#B8922A"/>
  <rect x="39" y="32" width="4" height="6" rx="1" fill="#B8922A"/>
  <!-- Pan icon at side -->
  <circle cx="47" cy="24" r="5" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <line x1="47" y1="29" x2="47" y2="35" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  <!-- PUBG text -->
  <text x="32" y="56" font-family="Arial Black, sans-serif" font-size="8" font-weight="900" fill="#D4AF37" text-anchor="middle" letter-spacing="0.5">PUBG</text>
</svg>
