<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0b1a2e"/>
  <defs>
    <linearGradient id="ef-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2a4a"/>
      <stop offset="100%" stop-color="#061220"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#ef-bg)"/>
  <!-- Football circle -->
  <circle cx="32" cy="26" r="14" fill="#1a1a1a" stroke="#00C8FF" stroke-width="2.5"/>
  <!-- Pentagon center -->
  <circle cx="32" cy="26" r="5" fill="#0b1a2e" stroke="#00C8FF" stroke-width="1.5"/>
  <!-- Accent lines -->
  <line x1="32" y1="12" x2="32" y2="40" stroke="#00C8FF" stroke-width="1.5" opacity="0.5"/>
  <line x1="18" y1="26" x2="46" y2="26" stroke="#00C8FF" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom text bar -->
  <rect x="10" y="46" width="44" height="8" rx="4" fill="#00C8FF" opacity="0.15"/>
  <text x="32" y="53" font-family="Arial Black, sans-serif" font-size="8" font-weight="900" fill="#00C8FF" text-anchor="middle" letter-spacing="0.5">eFOOTBALL</text>
</svg>
